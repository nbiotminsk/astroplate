name: Build and Deploy Dist

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build project
        run: yarn build

      - name: Ensure publish-only files exist
        run: |
          touch dist/.nojekyll
          cp dist/htaccess.txt dist/.htaccess
          chmod 644 dist/.htaccess

      - name: Publish dist to target repository
        env:
          TARGET_BRANCH: deploy
        run: |
          set -euo pipefail

          workdir="$(mktemp -d)"
          rsync -a --delete --exclude='.git' "$GITHUB_WORKSPACE"/dist/ "$workdir"/

          cd "$workdir"
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git checkout -b "$TARGET_BRANCH"
          git add -A

          if git diff --cached --quiet; then
            echo "No dist changes to publish"
            exit 0
          fi

          git commit -m "Deploy dist from main"
          git push --force origin "$TARGET_BRANCH"
        shell: bash
