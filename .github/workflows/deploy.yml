name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Generate Theme and JSON
        run: node scripts/themeGenerator.js && node scripts/jsonGenerator.js

      - name: Run Check (Lint & Types)
        run: npm run check

      - name: Build Project
        run: npm run build

      - name: Prepare for Deployment
        run: |
          touch dist/.nojekyll
          if [ -f dist/htaccess.txt ]; then
            cp dist/htaccess.txt dist/.htaccess
            chmod 644 dist/.htaccess
          fi

      - name: Deploy to Deploy Branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: deploy
          force_orphan: true
          commit_message: "Deploy: ${{ github.sha }} [skip ci]"
